<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">Failure case matrix</title>
  <desc id="desc">A four-panel matrix of expected hard cases for captured-screen video normalization.</desc>
  <defs><style>
    .title{font:700 40px Georgia,"Times New Roman",serif;fill:#191919}.subtitle{font:400 20px -apple-system,BlinkMacSystemFont,"Segoe UI",Arial,sans-serif;fill:#5d5f66}
    .head{font:700 25px -apple-system,BlinkMacSystemFont,"Segoe UI",Arial,sans-serif;fill:#202124}.small{font:400 18px -apple-system,BlinkMacSystemFont,"Segoe UI",Arial,sans-serif;fill:#666a72}.tag{font:700 14px -apple-system,BlinkMacSystemFont,"Segoe UI",Arial,sans-serif;letter-spacing:1px;fill:#b97857}
  </style></defs>
  <rect width="1600" height="900" fill="#fbfaf7"/>
  <text class="title" x="76" y="88">Failure Modes to Analyze</text>
  <text class="subtitle" x="76" y="122">Failure examples are evidence: they define the operating boundary of the preprocessing chain.</text>
  <g transform="translate(112 190)">
    <g><rect x="0" y="0" width="650" height="260" rx="22" fill="#ffffff" stroke="#d8d3c9"/><text class="tag" x="32" y="42">CASE 1</text><text class="head" x="32" y="78">Weak border / low texture</text><rect x="420" y="55" width="160" height="100" rx="8" fill="#ffffff" stroke="#d8d3c9" stroke-width="4"/><line x1="445" y1="105" x2="555" y2="105" stroke="#f4f1eb" stroke-width="14"/><text class="small" x="32" y="138">PPT and white pages may not provide reliable</text><text class="small" x="32" y="166">corners or stable feature points.</text></g>
    <g transform="translate(720 0)"><rect x="0" y="0" width="650" height="260" rx="22" fill="#ffffff" stroke="#d8d3c9"/><text class="tag" x="32" y="42">CASE 2</text><text class="head" x="32" y="78">Scrolling content drift</text><rect x="420" y="55" width="160" height="100" rx="8" fill="#f7fbf9" stroke="#1e7a63" stroke-width="4"/><path d="M470 85 L450 105 L470 125" fill="none" stroke="#b97857" stroke-width="5"/><path d="M530 85 L550 105 L530 125" fill="none" stroke="#b97857" stroke-width="5"/><text class="small" x="32" y="138">Content motion can dominate optical flow and</text><text class="small" x="32" y="166">pull the estimated homography away.</text></g>
    <g transform="translate(0 320)"><rect x="0" y="0" width="650" height="260" rx="22" fill="#ffffff" stroke="#d8d3c9"/><text class="tag" x="32" y="42">CASE 3</text><text class="head" x="32" y="78">In-screen video motion</text><rect x="420" y="55" width="160" height="100" rx="8" fill="#f7fbf9" stroke="#1e7a63" stroke-width="4"/><polygon points="484,82 484,132 528,107" fill="#b97857"/><text class="small" x="32" y="138">Large dynamic areas reduce the fraction of</text><text class="small" x="32" y="166">features tied to the physical screen plane.</text></g>
    <g transform="translate(720 320)"><rect x="0" y="0" width="650" height="260" rx="22" fill="#e4f1eb" stroke="#1e7a63" stroke-width="3"/><text class="tag" x="32" y="42">CASE 4</text><text class="head" x="32" y="78">Moiré / glare hard cases</text><rect x="420" y="55" width="160" height="100" rx="8" fill="#ffffff" stroke="#1e7a63" stroke-width="4"/><path d="M435 80 C470 55 500 108 535 82 S580 78 590 63" fill="none" stroke="#b97857" stroke-width="3"/><path d="M435 125 C470 100 500 153 535 127 S580 123 590 108" fill="none" stroke="#b97857" stroke-width="3"/><text class="small" x="32" y="138">Moiré, reflections, and saturation affect both</text><text class="small" x="32" y="166">screen detection and feature tracking.</text></g>
  </g>
</svg>
