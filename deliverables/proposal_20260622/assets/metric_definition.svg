<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">Residual motion metric definition</title>
  <desc id="desc">A schematic definition of residual translation, rotation, and scale delta computed from adjacent normalized frames.</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="9" markerHeight="9" orient="auto-start-reverse"><path d="M0 0 L10 5 L0 10z" fill="#1e7a63"/></marker>
    <style>.title{font:700 40px Georgia,"Times New Roman",serif;fill:#191919}.subtitle{font:400 20px -apple-system,BlinkMacSystemFont,"Segoe UI",Arial,sans-serif;fill:#5d5f66}.head{font:700 25px -apple-system,BlinkMacSystemFont,"Segoe UI",Arial,sans-serif;fill:#202124}.small{font:400 18px -apple-system,BlinkMacSystemFont,"Segoe UI",Arial,sans-serif;fill:#666a72}.formula{font:700 28px Georgia,"Times New Roman",serif;fill:#0f3f36}.tag{font:700 14px -apple-system,BlinkMacSystemFont,"Segoe UI",Arial,sans-serif;letter-spacing:1px;fill:#0f5d4f}</style>
  </defs>
  <rect width="1600" height="900" fill="#fbfaf7"/>
  <text class="title" x="76" y="88">Residual Motion Metrics</text>
  <text class="subtitle" x="76" y="122">We evaluate stability by estimating the residual affine motion between adjacent normalized frames.</text>
  <g transform="translate(115 210)">
    <rect x="0" y="0" width="410" height="310" rx="22" fill="#ffffff" stroke="#d8d3c9"/><text class="tag" x="32" y="44">FRAME t</text><rect x="85" y="92" width="240" height="135" rx="8" fill="#e4f1eb" stroke="#1e7a63" stroke-width="4"/><line x1="120" y1="128" x2="292" y2="128" stroke="#d8d3c9" stroke-width="8"/><line x1="120" y1="162" x2="245" y2="162" stroke="#d8d3c9" stroke-width="8"/>
  </g>
  <path d="M565 365 H735" stroke="#1e7a63" stroke-width="5" marker-end="url(#arrow)"/><text class="head" x="580" y="325">estimate residual affine transform</text>
  <g transform="translate(780 210)">
    <rect x="0" y="0" width="410" height="310" rx="22" fill="#ffffff" stroke="#d8d3c9"/><text class="tag" x="32" y="44">FRAME t + 1</text><rect x="95" y="88" width="240" height="135" rx="8" fill="#e4f1eb" stroke="#1e7a63" stroke-width="4" transform="rotate(2 215 155) translate(10 4)"/><line x1="135" y1="130" x2="300" y2="136" stroke="#d8d3c9" stroke-width="8"/><line x1="135" y1="164" x2="255" y2="168" stroke="#d8d3c9" stroke-width="8"/>
  </g>
  <g transform="translate(1215 210)">
    <rect x="0" y="0" width="270" height="310" rx="22" fill="#e4f1eb" stroke="#1e7a63" stroke-width="3"/><text class="tag" x="32" y="44">REPORT p95</text><text class="formula" x="32" y="105">translation</text><text class="small" x="32" y="134">residual shift in px</text><text class="formula" x="32" y="188">rotation</text><text class="small" x="32" y="217">residual angle in degree</text><text class="formula" x="32" y="271">scale delta</text><text class="small" x="32" y="300">residual zoom change</text>
  </g>
  <g transform="translate(240 610)">
    <rect x="0" y="0" width="1120" height="94" rx="22" fill="#ffffff" stroke="#d8d3c9"/><text class="head" x="32" y="42">Interpretation</text><text class="small" x="32" y="72">Lower p95 residual motion means the normalized output is more stable. These are stability metrics, not ground-truth image reconstruction scores.</text>
  </g>
</svg>
