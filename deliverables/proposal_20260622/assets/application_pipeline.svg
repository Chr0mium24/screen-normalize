<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">Application pipeline for captured-screen video preprocessing</title>
  <desc id="desc">A unified academic-style pipeline diagram showing how raw captured screen video is transformed into a normalized screen video before downstream demoiréing, OCR, or archive tasks.</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="9" markerHeight="9" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#1e7a63"/>
    </marker>
    <style>
      .title{font:700 40px Georgia,"Times New Roman",serif;fill:#191919}
      .subtitle{font:400 20px -apple-system,BlinkMacSystemFont,"Segoe UI",Arial,sans-serif;fill:#5d5f66}
      .step{font:700 24px -apple-system,BlinkMacSystemFont,"Segoe UI",Arial,sans-serif;fill:#202124}
      .small{font:400 17px -apple-system,BlinkMacSystemFont,"Segoe UI",Arial,sans-serif;fill:#666a72}
      .tag{font:700 14px -apple-system,BlinkMacSystemFont,"Segoe UI",Arial,sans-serif;letter-spacing:1px;fill:#0f5d4f}
    </style>
  </defs>
  <rect width="1600" height="900" fill="#fbfaf7"/>
  <text class="title" x="76" y="88">Application Pipeline</text>
  <text class="subtitle" x="76" y="122">The project fills the pre-alignment stage before demoiréing, OCR, or archival restoration.</text>

  <g transform="translate(78 230)">
    <rect x="0" y="0" width="200" height="270" rx="22" fill="#ffffff" stroke="#d8d3c9"/>
    <text class="tag" x="30" y="44">INPUT</text>
    <polygon points="48,96 158,76 172,180 38,198" fill="#f2e6df" stroke="#b97857" stroke-width="3"/>
    <line x1="68" y1="125" x2="145" y2="110" stroke="#b97857" stroke-width="2"/>
    <line x1="62" y1="155" x2="154" y2="139" stroke="#b97857" stroke-width="2"/>
    <text class="step" x="30" y="235">Captured</text>
    <text class="small" x="30" y="260">full camera frame</text>
  </g>

  <g transform="translate(338 230)">
    <rect x="0" y="0" width="200" height="270" rx="22" fill="#ffffff" stroke="#d8d3c9"/>
    <text class="tag" x="30" y="44">STAGE 1</text>
    <polygon points="45,78 160,88 156,185 38,176" fill="#f7fbf9" stroke="#1e7a63" stroke-width="4"/>
    <circle cx="45" cy="78" r="7" fill="#1e7a63"/><circle cx="160" cy="88" r="7" fill="#1e7a63"/>
    <circle cx="156" cy="185" r="7" fill="#1e7a63"/><circle cx="38" cy="176" r="7" fill="#1e7a63"/>
    <text class="step" x="30" y="235">Screen region</text>
    <text class="small" x="30" y="260">detect or manual corners</text>
  </g>

  <g transform="translate(598 230)">
    <rect x="0" y="0" width="200" height="270" rx="22" fill="#ffffff" stroke="#d8d3c9"/>
    <text class="tag" x="30" y="44">STAGE 2</text>
    <rect x="38" y="78" width="126" height="98" rx="6" fill="#f7fbf9" stroke="#1e7a63" stroke-width="4"/>
    <path d="M38 78 L25 62 M164 78 L178 62 M38 176 L25 194 M164 176 L178 194" stroke="#b97857" stroke-width="3"/>
    <text class="step" x="30" y="235">Rectification</text>
    <text class="small" x="30" y="260">homography warp</text>
  </g>

  <g transform="translate(858 230)">
    <rect x="0" y="0" width="200" height="270" rx="22" fill="#ffffff" stroke="#d8d3c9"/>
    <text class="tag" x="30" y="44">STAGE 3</text>
    <rect x="38" y="78" width="126" height="98" rx="6" fill="#f7fbf9" stroke="#1e7a63" stroke-width="3"/>
    <circle cx="62" cy="105" r="5" fill="#1e7a63"/><circle cx="92" cy="132" r="5" fill="#1e7a63"/><circle cx="132" cy="116" r="5" fill="#1e7a63"/>
    <path d="M62 105 C82 94 106 98 132 116" fill="none" stroke="#b97857" stroke-width="3"/>
    <text class="step" x="30" y="235">Reference tracking</text>
    <text class="small" x="30" y="260">LK flow + RANSAC</text>
  </g>

  <g transform="translate(1118 230)">
    <rect x="0" y="0" width="200" height="270" rx="22" fill="#ffffff" stroke="#d8d3c9"/>
    <text class="tag" x="30" y="44">STAGE 4</text>
    <path d="M43 162 C70 86 101 210 130 116 S168 131 172 104" fill="none" stroke="#b97857" stroke-width="3" opacity=".45"/>
    <path d="M43 145 C80 118 112 137 172 116" fill="none" stroke="#1e7a63" stroke-width="5"/>
    <text class="step" x="30" y="235">Temporal stability</text>
    <text class="small" x="30" y="260">reject, interpolate, smooth</text>
  </g>

  <g transform="translate(1378 230)">
    <rect x="0" y="0" width="145" height="270" rx="22" fill="#e4f1eb" stroke="#1e7a63" stroke-width="3"/>
    <text class="tag" x="26" y="44">OUTPUT</text>
    <rect x="24" y="80" width="98" height="62" rx="6" fill="#ffffff" stroke="#1e7a63" stroke-width="3"/>
    <rect x="34" y="95" width="78" height="6" rx="3" fill="#d8d3c9"/>
    <rect x="34" y="112" width="58" height="6" rx="3" fill="#d8d3c9"/>
    <text class="step" x="24" y="222">Normalized</text>
    <text class="small" x="24" y="250">screen video</text>
  </g>

  <path d="M280 365 H326" stroke="#1e7a63" stroke-width="4" marker-end="url(#arrow)"/>
  <path d="M540 365 H586" stroke="#1e7a63" stroke-width="4" marker-end="url(#arrow)"/>
  <path d="M800 365 H846" stroke="#1e7a63" stroke-width="4" marker-end="url(#arrow)"/>
  <path d="M1060 365 H1106" stroke="#1e7a63" stroke-width="4" marker-end="url(#arrow)"/>
  <path d="M1320 365 H1366" stroke="#1e7a63" stroke-width="4" marker-end="url(#arrow)"/>

  <g transform="translate(438 615)">
    <rect x="0" y="0" width="724" height="88" rx="22" fill="#ffffff" stroke="#d8d3c9"/>
    <text class="tag" x="32" y="35">DOWNSTREAM TASKS</text>
    <text class="step" x="32" y="66">Video demoiréing</text>
    <text class="step" x="276" y="66">OCR</text>
    <text class="step" x="390" y="66">Archive</text>
    <text class="step" x="548" y="66">Manual review</text>
  </g>
</svg>
