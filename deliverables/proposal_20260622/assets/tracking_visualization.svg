<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">Reference-plane tracking visualization</title>
  <desc id="desc">A schematic visualization of tracked features, RANSAC inliers, outliers, and the estimated screen quadrilateral.</desc>
  <defs><style>
    .title{font:700 40px Georgia,"Times New Roman",serif;fill:#191919}.subtitle{font:400 20px -apple-system,BlinkMacSystemFont,"Segoe UI",Arial,sans-serif;fill:#5d5f66}
    .head{font:700 25px -apple-system,BlinkMacSystemFont,"Segoe UI",Arial,sans-serif;fill:#202124}.small{font:400 18px -apple-system,BlinkMacSystemFont,"Segoe UI",Arial,sans-serif;fill:#666a72}.tag{font:700 14px -apple-system,BlinkMacSystemFont,"Segoe UI",Arial,sans-serif;letter-spacing:1px;fill:#0f5d4f}
  </style></defs>
  <rect width="1600" height="900" fill="#fbfaf7"/>
  <text class="title" x="76" y="88">Reference-plane Tracking</text>
  <text class="subtitle" x="76" y="122">Use feature tracks that agree with a single screen-plane homography; reject dynamic-content outliers.</text>
  <g transform="translate(120 190)">
    <rect x="0" y="0" width="930" height="560" rx="24" fill="#ffffff" stroke="#d8d3c9"/>
    <polygon points="180,95 740,55 790,445 125,485" fill="#f7fbf9" stroke="#1e7a63" stroke-width="5"/>
    <polygon points="248,152 475,132 505,300 226,320" fill="#f2e6df" opacity=".75"/>
    <polygon points="530,150 705,138 730,300 548,316" fill="#f4f1eb"/>
    <circle cx="252" cy="188" r="7" fill="#1e7a63"/><circle cx="310" cy="160" r="7" fill="#1e7a63"/><circle cx="402" cy="202" r="7" fill="#1e7a63"/><circle cx="612" cy="215" r="7" fill="#1e7a63"/><circle cx="685" cy="260" r="7" fill="#1e7a63"/><circle cx="340" cy="374" r="7" fill="#1e7a63"/><circle cx="498" cy="395" r="7" fill="#1e7a63"/>
    <circle cx="450" cy="252" r="7" fill="#b97857"/><circle cx="575" cy="174" r="7" fill="#b97857"/><circle cx="640" cy="342" r="7" fill="#b97857"/>
    <path d="M252 188 L282 180 M310 160 L345 154 M402 202 L436 199 M612 215 L648 218 M685 260 L717 269 M340 374 L372 373 M498 395 L532 392" stroke="#1e7a63" stroke-width="3"/>
    <path d="M450 252 L494 230 M575 174 L615 145 M640 342 L680 380" stroke="#b97857" stroke-width="3" stroke-dasharray="8 8"/>
  </g>
  <g transform="translate(1110 245)">
    <rect x="0" y="0" width="365" height="390" rx="22" fill="#ffffff" stroke="#d8d3c9"/>
    <text class="tag" x="32" y="42">LEGEND</text>
    <circle cx="48" cy="88" r="8" fill="#1e7a63"/><text class="head" x="72" y="97">RANSAC inliers</text><text class="small" x="72" y="126">features consistent with screen plane</text>
    <circle cx="48" cy="178" r="8" fill="#b97857"/><text class="head" x="72" y="187">Rejected outliers</text><text class="small" x="72" y="216">dynamic content or tracking errors</text>
    <rect x="40" y="260" width="70" height="44" rx="6" fill="#f7fbf9" stroke="#1e7a63" stroke-width="4"/><text class="head" x="130" y="292">Estimated plane</text><text class="small" x="130" y="321">screen quadrilateral per frame</text>
  </g>
</svg>
