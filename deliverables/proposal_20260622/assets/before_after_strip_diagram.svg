<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">Before and after strip diagram</title>
  <desc id="desc">A schematic two-row strip showing raw captured frames with perspective distortion and normalized output frames after screen stabilization.</desc>
  <defs>
    <style>
      .title{font:700 40px Georgia,"Times New Roman",serif;fill:#191919}.subtitle{font:400 20px -apple-system,BlinkMacSystemFont,"Segoe UI",Arial,sans-serif;fill:#5d5f66}
      .label{font:700 25px -apple-system,BlinkMacSystemFont,"Segoe UI",Arial,sans-serif;fill:#202124}.small{font:400 17px -apple-system,BlinkMacSystemFont,"Segoe UI",Arial,sans-serif;fill:#666a72}
    </style>
  </defs>
  <rect width="1600" height="900" fill="#fbfaf7"/>
  <text class="title" x="76" y="88">Before / After Temporal Strip</text>
  <text class="subtitle" x="76" y="122">The intended presentation view: raw phone-captured frames versus stabilized screen-coordinate output.</text>
  <text class="label" x="86" y="212">Raw captured frames</text><text class="small" x="86" y="240">background, perspective distortion, hand-held motion</text>
  <text class="label" x="86" y="535">Normalized output frames</text><text class="small" x="86" y="563">fixed 16:9 screen coordinates, reduced residual motion</text>
  <g transform="translate(360 170)">
    <g><rect x="0" y="0" width="260" height="190" rx="18" fill="#ffffff" stroke="#d8d3c9"/><polygon points="54,52 206,36 222,143 42,157" fill="#f2e6df" stroke="#b97857" stroke-width="4"/></g>
    <g transform="translate(285 0)"><rect x="0" y="0" width="260" height="190" rx="18" fill="#ffffff" stroke="#d8d3c9"/><polygon points="48,42 216,54 205,154 58,143" fill="#f2e6df" stroke="#b97857" stroke-width="4"/></g>
    <g transform="translate(570 0)"><rect x="0" y="0" width="260" height="190" rx="18" fill="#ffffff" stroke="#d8d3c9"/><polygon points="62,38 205,47 218,150 42,147" fill="#f2e6df" stroke="#b97857" stroke-width="4"/></g>
    <g transform="translate(855 0)"><rect x="0" y="0" width="260" height="190" rx="18" fill="#ffffff" stroke="#d8d3c9"/><polygon points="44,55 216,34 208,144 66,158" fill="#f2e6df" stroke="#b97857" stroke-width="4"/></g>
  </g>
  <g transform="translate(360 493)">
    <g><rect x="0" y="0" width="260" height="190" rx="18" fill="#e4f1eb" stroke="#1e7a63" stroke-width="3"/><rect x="42" y="54" width="176" height="99" rx="8" fill="#ffffff" stroke="#1e7a63" stroke-width="4"/></g>
    <g transform="translate(285 0)"><rect x="0" y="0" width="260" height="190" rx="18" fill="#e4f1eb" stroke="#1e7a63" stroke-width="3"/><rect x="42" y="54" width="176" height="99" rx="8" fill="#ffffff" stroke="#1e7a63" stroke-width="4"/></g>
    <g transform="translate(570 0)"><rect x="0" y="0" width="260" height="190" rx="18" fill="#e4f1eb" stroke="#1e7a63" stroke-width="3"/><rect x="42" y="54" width="176" height="99" rx="8" fill="#ffffff" stroke="#1e7a63" stroke-width="4"/></g>
    <g transform="translate(855 0)"><rect x="0" y="0" width="260" height="190" rx="18" fill="#e4f1eb" stroke="#1e7a63" stroke-width="3"/><rect x="42" y="54" width="176" height="99" rx="8" fill="#ffffff" stroke="#1e7a63" stroke-width="4"/></g>
  </g>
  <text class="small" x="360" y="398">t0</text><text class="small" x="645" y="398">t1</text><text class="small" x="930" y="398">t2</text><text class="small" x="1215" y="398">t3</text>
</svg>
